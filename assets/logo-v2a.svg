<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90" fill="none">
  <!-- V2A: Original concept refined — Inter font, tighter spacing,
       accent bar left-aligned under first name -->
  
  <text x="14" y="48" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#1c1917" letter-spacing="0.5">devin</text>
  <text x="128" y="48" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#1c1917" letter-spacing="0.5">gruber</text>
  
  <!-- Gold accent bar -->
  <rect x="14" y="58" width="40" height="2.5" rx="1.25" fill="#c2a472"/>
  
  <!-- Tagline -->
  <text x="14" y="78" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="3.5" font-weight="300">PHOTO &amp; VIDEO</text>
</svg>
