<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 110" fill="none">
  <!-- Option 3: Script name (like original) but cleaner — 
       no outline/glow, no sparkles, integrated lens as the period/dot -->
  
  <!-- Stylized script text -->
  <text x="16" y="68" font-family="Georgia, 'Brush Script MT', cursive" font-size="52" font-weight="400" font-style="italic" fill="#1c1917" letter-spacing="-0.5">Devin Gruber</text>
  
  <!-- Small lens dot as a visual period -->
  <circle cx="378" cy="62" r="8" stroke="#c2a472" stroke-width="1.2" fill="none"/>
  <circle cx="378" cy="62" r="3.5" fill="#c2a472" opacity="0.5"/>
  
  <!-- Tagline beneath, widely spaced -->
  <text x="16" y="98" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#a8a29e" letter-spacing="4" font-weight="300">PHOTOGRAPHY &amp; FILM</text>
</svg>
