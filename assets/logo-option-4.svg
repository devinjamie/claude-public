<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" fill="none">
  <!-- Option 4: Stacked layout — name on top, role beneath,
       clean vertical hierarchy with warm accent line divider -->
  
  <!-- Name - large, serif -->
  <text x="180" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" fill="#1c1917" text-anchor="middle" letter-spacing="-0.5">Devin Gruber</text>
  
  <!-- Divider line - warm gold -->
  <rect x="145" y="64" width="70" height="1.5" rx="0.75" fill="#c2a472"/>
  
  <!-- Role -->
  <text x="180" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#78716c" text-anchor="middle" letter-spacing="4" font-weight="300">PHOTO &amp; VIDEO</text>
  
  <!-- Minimal aperture mark - very subtle -->
  <circle cx="180" cy="112" r="6" stroke="#c2a472" stroke-width="0.8" fill="none" opacity="0.5"/>
  <circle cx="180" cy="112" r="2.5" fill="#c2a472" opacity="0.3"/>
</svg>
