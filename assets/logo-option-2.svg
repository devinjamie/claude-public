<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Option 2: Modern sans-serif, bold name, no camera icon, 
       typographic only with a warm accent bar -->
  
  <!-- First name - lighter weight -->
  <text x="16" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="300" fill="#1c1917" letter-spacing="1">devin</text>
  
  <!-- Last name - bold -->
  <text x="138" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#1c1917" letter-spacing="1">gruber</text>
  
  <!-- Warm accent bar -->
  <rect x="16" y="66" width="48" height="3" rx="1.5" fill="#c2a472"/>
  
  <!-- Subtitle -->
  <text x="16" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#78716c" letter-spacing="3" font-weight="300">PHOTO &amp; VIDEO</text>
</svg>
