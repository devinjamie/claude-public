<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Option 1: Clean script + minimal lens icon, no sparkles, no outline glow -->
  <!-- Warm gold accent on the camera aperture only -->
  
  <!-- Name in elegant script -->
  <text x="20" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="400" font-style="italic" fill="#1c1917" letter-spacing="-1">Devin Gruber</text>
  
  <!-- Subtle underline stroke -->
  <path d="M 22 88 Q 180 95 340 85" stroke="#c2a472" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Minimal camera aperture icon -->
  <circle cx="410" cy="60" r="22" stroke="#1c1917" stroke-width="1.5" fill="none"/>
  <circle cx="410" cy="60" r="14" stroke="#c2a472" stroke-width="1.2" fill="none"/>
  <circle cx="410" cy="60" r="5" fill="#c2a472" opacity="0.3"/>
  
  <!-- Small tagline -->
  <text x="22" y="108" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#a8a29e" letter-spacing="2.5" font-weight="300">PHOTO &amp; VIDEO</text>
</svg>
