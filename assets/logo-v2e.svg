<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" fill="none">
  <!-- V2E: Stacked version of the same concept — 
       name on one line, tagline below, gold bar between.
       Good for square/compact use (favicon, watermark, end card) -->
  
  <text x="14" y="42" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="200" fill="#1c1917" letter-spacing="0.5">devin</text>
  <text x="120" y="42" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#1c1917" letter-spacing="0.5">gruber</text>
  
  <!-- Gold bar full width -->
  <rect x="14" y="54" width="280" height="1.5" rx="0.75" fill="#c2a472" opacity="0.6"/>
  
  <!-- Tagline centered under the line -->
  <text x="14" y="74" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="10.5" fill="#78716c" letter-spacing="6" font-weight="300">PHOTO &amp; VIDEO</text>
</svg>
